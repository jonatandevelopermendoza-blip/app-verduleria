<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Verdulería App</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .change-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .change-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .info-box {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
        }
    </style>
</head>
<body>
    <div class="change-container">
        <h2>Cambiar Contraseña</h2>
        <div class="info-box">
            <strong>⚠️ Primera vez que ingresas</strong><br>
            Es necesario cambiar tu contraseña temporal antes de continuar.
        </div>
        <form id="cambiarPasswordForm">
            <div class="form-group">
                <label>Nueva Contraseña (mínimo 6 caracteres):</label>
                <input type="password" id="nueva_password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña:</label>
                <input type="password" id="confirmar_password" required>
            </div>
            <div id="error" class="alert error" style="display: none;"></div>
            <div id="success" class="alert success" style="display: none;"></div>
            <button type="submit">Cambiar Contraseña</button>
        </form>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        // Verificar que hay un token de cambio
        const token = sessionStorage.getItem('token');
        const tempToken = sessionStorage.getItem('temp_token');
        
        if (!token && !tempToken) {
            window.location.href = '/';
        }
        
        // Usar el token disponible (priorizar temp_token si existe)
        const authToken = tempToken || token;
        
        document.getElementById('cambiarPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nuevaPassword = document.getElementById('nueva_password').value;
            const confirmarPassword = document.getElementById('confirmar_password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            // Limpiar mensajes anteriores
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validaciones
            if (nuevaPassword.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (nuevaPassword !== confirmarPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/cambiar-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ nueva_password: nuevaPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Guardar el nuevo token normal
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.removeItem('temp_token');
                    sessionStorage.setItem('rol', data.rol || 'empleado');
                    sessionStorage.setItem('requires_change', 'false');
                    
                    successDiv.textContent = 'Contraseña cambiada exitosamente. Redirigiendo...';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || 'Error al cambiar la contraseña';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión. Intente nuevamente.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
